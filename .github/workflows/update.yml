name: Update Netflix Data
on:
  schedule:
    - cron: '0 4 * * *' # Elke nacht om 04:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run scraper
        env:
          UNOGS_API_KEY: ${{ secrets.UNOGS_API_KEY }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          OMDB_API_KEY: ${{ secrets.OMDB_API_KEY }}
        run: python update_all.py

      - name: Commit and Push
        run: |
          git config user.name "Netflix Update Bot"
          git config user.email "bot@yourdomain.be"

          git add netflix_data.json netflix_last_month.json availability_cache.json imdb_cache.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Automated update: $(date -u +'%Y-%m-%d')"
          git push
