name: Update & Deploy Data (orig pipeline)

on:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install requests; fi

      - name: Run Update Script
        env:
          TMDB_API_KEY: "ca7bc87061528b91ac4b42e235851f9a"
          TRAKT_CLIENT_ID: "1c0cbb71ec18b665a18642f01cac9c2a46f3a35435f505d46150eb403ccdcf1c"
          UNOGS_API_KEY: "a0eabd432bmsh73864f49b31f288p19c6eejsna588d186044e"
        run: python update_all.py
      
      - name: Show JSON hashes
        run: |
          for f in netflix_data.json netflix_last_month.json; do
            if [ -f "$f" ]; then
              echo "$f  ->  $(sha256sum "$f" | cut -d' ' -f1)"
            else
              echo "$f not found"
            fi
          done

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git rebase origin/main || git rebase --abort || true
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "Update data [skip ci]"
            git push origin HEAD:main
          else
            echo "No changes to commit."
          fi
